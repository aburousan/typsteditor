name: Build desktop bundles

# Tauri compiles native code against each OS's system webview (WebKitGTK on
# Linux, WKWebView on macOS), so — unlike Electron — it cannot cross-compile;
# each target is built on its own runner.
#
# Windows builds on a native `windows-latest` runner — GitHub gives it away free,
# and Tauri produces a proper `.msi` + `.exe` (NSIS) there. (Only *cross*-building
# Windows from Linux with cargo-xwin was unreliable; a native runner is not.)
#
# Build-only: uploads per-platform artifacts you can download from the run.
# Releases are cut manually (see README) so the Electron `v*` and Tauri
# `tauri-v*` release lines stay cleanly separated.
on:
  workflow_dispatch:        # build on demand from the Actions tab

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04        # Linux: AppImage + .deb
            args: ""
            rust_target: ""
          - os: macos-14            # macOS Apple Silicon: .app + .dmg
            args: "--target aarch64-apple-darwin"
            rust_target: "aarch64-apple-darwin"
          - os: macos-13            # macOS Intel: .app + .dmg
            args: "--target x86_64-apple-darwin"
            rust_target: "x86_64-apple-darwin"
          - os: windows-latest      # Windows x64: .msi + .exe (NSIS)
            args: ""
            rust_target: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # The built UI (resources/dist) is committed in this repo — no frontend
      # build step needed here. To refresh it, rebuild the sibling project and
      # re-copy dist (see README).

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: tauri-apps/tauri-action@v0
        env:
          # Signs the auto-updater artifacts. Add the private key (contents of
          # ~/Desktop/hilbert-updater-private.key) as a repo secret to enable updates.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          projectPath: .
          args: ${{ matrix.args }}

      - uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.os }}
          path: |
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*.exe
            src-tauri/target/**/release/bundle/**/*.sig
            src-tauri/target/**/release/bundle/**/*.tar.gz
            src-tauri/target/**/release/bundle/**/*.zip
