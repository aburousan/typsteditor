name: Release desktop bundles

# Builds, signs, and publishes a cross-platform release with the auto-updater
# artifacts + latest.json, so installed apps can update themselves.
#
# Tauri compiles native code against each OS's system webview (WebKitGTK on
# Linux, WebView2 on Windows, WKWebView on macOS), so — unlike Electron — it
# cannot cross-compile; each target builds on its own runner.
#
# Manual trigger. It creates a DRAFT release: every platform job uploads its
# bundles and merges its signature into a single latest.json on that draft.
# Publish the draft afterwards (and mark it Latest) so the updater endpoint
# — github…/releases/latest/download/latest.json — resolves to it.

on:
  workflow_dispatch:

permissions:
  contents: write        # tauri-action needs this to create the release

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04        # Linux: AppImage + .deb
            args: ""
            rust_target: ""
          - os: macos-14            # macOS Apple Silicon: .app + .dmg
            args: "--target aarch64-apple-darwin"
            rust_target: "aarch64-apple-darwin"
          - os: macos-14            # macOS Intel: cross-compiled on Apple Silicon
            args: "--target x86_64-apple-darwin"      # (the macos-13 Intel runner is unreliable — never gets assigned)
            rust_target: "x86_64-apple-darwin"
          - os: windows-latest      # Windows x64: .msi + .exe (NSIS)
            args: ""
            rust_target: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Tauri builds and bundles the root frontend from this monorepo.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Pinned to a commit SHA (not the mutable @v0 tag) so a compromise of the
      # action's tag can't run with the signing key. SHA is action-v1.0.0.
      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the auto-updater artifacts. Repo secret = the full contents of
          # ~/Desktop/hilbert-updater-private.key. The key's password is empty.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          projectPath: .
          args: ${{ matrix.args }}
          tagName: tauri-v__VERSION__
          releaseName: "Hilbert (Tauri) v__VERSION__"
          # This text is baked into latest.json as the update-dialog message
          # (the app shows its first 300 characters), so keep it a short,
          # user-facing summary and refresh it for every release. The full
          # notes from docs/RELEASE_NOTES.md are pasted in at publish time.
          releaseBody: |
            Slide Studio for building presentation decks, Zotero citations, a much faster live preview, and live error checking from tinymist.
          releaseDraft: true
          prerelease: false

  # The GTK AppImage bundle pulls libwayland-*.so* into the image; on Wayland/KDE
  # those clash with the host's mesa/EGL and the app fails to start. Strip them,
  # repack, then re-sign the fixed AppImage and patch its signature back into
  # latest.json. Runs after every build job so latest.json is already settled.
  fix-appimage-wayland:
    needs: release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Get AppImage tooling
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y jq python3
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
      - name: Download the built AppImage + latest.json from the draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          echo "TAG=tauri-v$VERSION" >> "$GITHUB_ENV"
          gh release download "tauri-v$VERSION" -R "$GITHUB_REPOSITORY" \
            -p '*_amd64.AppImage' -p '*_amd64.AppImage.sig' -p 'latest.json' --clobber
      - name: Strip bundled Wayland libs and repack
        run: |
          set -euo pipefail
          APP=$(ls *_amd64.AppImage)
          chmod +x "$APP"
          APPIMAGE_EXTRACT_AND_RUN=1 ./"$APP" --appimage-extract >/dev/null
          rm -fv squashfs-root/usr/lib/libwayland-*.so*
          find squashfs-root -iname 'im-wayland.so' -delete
          if find squashfs-root -iname 'libwayland-*.so*' | grep -q .; then
            echo "::error::libwayland still bundled after strip"; exit 1
          fi
          rm -f "$APP"
          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 ./appimagetool squashfs-root "$APP"
          test -f "$APP"
          echo "APP=$APP" >> "$GITHUB_ENV"
      - name: Re-sign and patch latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          set -euo pipefail
          npx --yes @tauri-apps/cli@2 signer sign -k "$TAURI_SIGNING_PRIVATE_KEY" -p "" "$APP"
          test -f "$APP.sig"
          python3 - "$APP" <<'PY'
          import json, sys
          app = sys.argv[1]
          sig = open(app + ".sig").read().strip()
          d = json.load(open("latest.json"))
          # Only the AppImage-backed keys — the .deb/.rpm entries point to other
          # files and must keep their own signatures.
          n = 0
          for k in ("linux-x86_64", "linux-x86_64-appimage"):
              if k in d["platforms"]:
                  d["platforms"][k]["signature"] = sig
                  n += 1
          assert n > 0, "no AppImage platform key found in latest.json"
          json.dump(d, open("latest.json", "w"), indent=2)
          print(f"patched {n} AppImage entries (deb/rpm untouched)")
          PY
          gh release upload "$TAG" "$APP" "$APP.sig" latest.json --clobber -R "$GITHUB_REPOSITORY"
