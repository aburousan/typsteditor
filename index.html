<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hilbert — Typst editor (Unofficial)</title>
    <script>
      window.appStartTime = performance.now();
      window.logTiming = function(label) {
        const elapsed = performance.now() - window.appStartTime;
        let timeStr = elapsed < 1000 ? Math.round(elapsed) + ' ms' : (elapsed / 1000).toFixed(1) + ' s';
        console.log((label + ' ').padEnd(27, '.') + ' ' + timeStr);
      };
      window.logTiming('Window created');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
